<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Own Your Web — Project Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      margin-bottom: 40px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: #888;
      font-size: 16px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
    }
    
    .stat-label {
      color: #888;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .stat-value {
      font-size: 36px;
      font-weight: 700;
    }
    
    .stat-value.green { color: #10b981; }
    .stat-value.blue { color: #3b82f6; }
    .stat-value.yellow { color: #f59e0b; }
    .stat-value.purple { color: #8b5cf6; }
    
    .clients-grid {
      display: grid;
      gap: 20px;
    }
    
    .client-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
    }
    
    .client-info h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .client-email {
      color: #888;
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .client-project {
      background: #2a2a2a;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      display: inline-block;
    }
    
    .client-meta {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      font-size: 14px;
      color: #888;
    }
    
    .client-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .stage-tracker {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }
    
    .stage-dots {
      display: flex;
      gap: 8px;
    }
    
    .stage-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }
    
    .stage-dot.active {
      background: #10b981;
      color: #000;
    }
    
    .stage-dot.current {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    
    .stage-name {
      font-size: 14px;
      font-weight: 500;
      color: #3b82f6;
    }
    
    .checklist {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #2a2a2a;
    }
    
    .checklist h4 {
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
    }
    
    .checklist-items {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .check-item {
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .check-item.done {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    
    .check-item .icon {
      font-size: 14px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    
    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
      color: #888;
    }
    
    .client-card.awaiting-payment {
      border-color: #f59e0b;
      background: linear-gradient(135deg, #1a1a1a 0%, rgba(245, 158, 11, 0.05) 100%);
    }
    
    .awaiting-note {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 8px;
      border-left: 3px solid #f59e0b;
    }
    
    .awaiting-note p {
      color: #f59e0b;
      font-size: 14px;
    }
    
    .project-notes {
      margin-top: 20px;
      padding: 16px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 8px;
      border-left: 3px solid #3b82f6;
    }
    
    .project-notes h4 {
      color: #3b82f6;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .project-notes p {
      color: #ccc;
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* Demo Leads Section */
    .demo-leads-section {
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid #2a2a2a;
    }
    
    .demo-leads-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .demo-leads-icon {
      width: 40px;
      height: 40px;
      background: rgba(139, 92, 246, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .demo-leads-title {
      font-size: 24px;
      font-weight: 600;
      color: #8b5cf6;
    }
    
    .demo-leads-subtitle {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }
    
    .demo-lead-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }
    
    .demo-lead-card:hover {
      border-color: #8b5cf6;
      transform: translateY(-2px);
    }
    
    .demo-lead-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    
    .demo-lead-business {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    
    .demo-lead-project {
      font-size: 14px;
      color: #8b5cf6;
      margin-top: 4px;
    }
    
    .demo-lead-status {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 100px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .demo-status-awaiting {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }
    
    .demo-status-building {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }
    
    .demo-status-interested {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }
    
    .demo-status-declined {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    
    .demo-lead-details {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #2a2a2a;
    }
    
    .demo-lead-detail {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .demo-detail-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .demo-detail-value {
      font-size: 14px;
      color: #ccc;
    }
    
    .demo-detail-value.price {
      color: #8b5cf6;
      font-weight: 600;
    }
    
    @media (max-width: 640px) {
      .client-card {
        grid-template-columns: 1fr;
      }
      
      .stage-tracker {
        align-items: flex-start;
        flex-direction: row;
        justify-content: space-between;
      }
      
      .demo-lead-header {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Own Your Web</h1>
      <p class="subtitle">Project Dashboard — Real-time client tracking</p>
    </header>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Active Projects</div>
        <div class="stat-value blue" id="active-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value green" id="total-revenue">$0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Awaiting Payment</div>
        <div class="stat-value yellow" id="payment-pending-count">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ready to Launch</div>
        <div class="stat-value purple" id="launch-count">0</div>
      </div>
    </div>
    
    <div class="clients-grid" id="clients-grid">
      <!-- Clients loaded via JS -->
    </div>
    
    <!-- DEMO LEADS SECTION -->
    <div class="demo-leads-section" id="demo-leads-section">
      <div class="demo-leads-header">
        <div class="demo-leads-icon">🎯</div>
        <div>
          <div class="demo-leads-title">Demo Leads</div>
          <div class="demo-leads-subtitle">Demo sites created for potential clients — awaiting response</div>
        </div>
      </div>
      
      <div class="demo-leads-grid" id="demo-leads-grid">
        <!-- Demo leads loaded via JS -->
      </div>
    </div>
  </div>
  
  <script>
    // Sample data - replace with actual client data
    const clients = [
      {
        id: 'client_001',
        name: 'Daryl Goodinh',
        email: 'imhookedseafoodllc@gmail.com',
        project: 'NEW LANDING PAGE',
        amount: 350,
        stage: 1,
        createdAt: '2026-03-12',
        confirmationSent: true,
        notes: 'Images received ✓ — Still awaiting: content, domain access, wording',
        checklist: {
          domainAccess: false,
          contentProvided: false,
          imagesProvided: true,
          hostingPrefs: false,
          designPreferences: true
        }
      },
      {
        id: 'client_002',
        name: 'Ashley Long',
        email: 'info@allyzworldofknowledge.com',
        project: 'ALLYZ WORLD OF KNOWLEDGE — Daycare Landing Page',
        amount: 290,
        stage: 2,
        createdAt: '2026-03-13',
        confirmationSent: true,
        notes: 'Custom domain: www.allyzworldofknowledge.com (DNS pending). Site built, awaiting client review.',
        checklist: {
          domainAccess: false,
          contentProvided: true,
          imagesProvided: true,
          hostingPrefs: true,
          designPreferences: true
        }
      },
      {
        id: 'client_003',
        name: 'Layonda Reason',
        email: 'Marlayphilly@gmail.com',
        project: 'NEW LOGO + FLYER — Unforgettable Moments',
        amount: 104,
        stage: 3,
        createdAt: '2026-03-13',
        confirmationSent: true,
        awaitingPayment: false,
        notes: '✓ Preview approved — Logo + Flyer add-on (+$25) in progress. Mobile photo keychain business. Design: keychain with camera, white background, black words, simple & elegant',
        checklist: {
          imagesProvided: true,
          designPreferences: true,
          flyerApproved: false
        }
      },
      {
        id: 'client_004',
        name: 'Nydeah',
        email: 'nydeah@203suites.com',
        project: 'NEW LOGO — 203 Suites',
        amount: 99,
        stage: 1,
        createdAt: '2026-03-16',
        confirmationSent: true,
        notes: '✓ PAID — Salon suite business. Design: black and simple. Ready to begin.',
        checklist: {
          imagesProvided: false,
          designPreferences: true
        }
      }
    ];
    
    // Demo Leads Data
    const demoLeads = [
      {
        id: 'demo_001',
        business: "MS MINNIES KITCHEN",
        project: "PROM SEND OFF COLLECTION Landing Page",
        contact: "Reached out",
        status: "awaiting",
        charge: 125,
        createdAt: '2026-03-16',
        notes: "Awaiting response from business owner"
      },
      {
        id: 'demo_002',
        business: "KJ LUXURY CONCIERGE LLC",
        project: "Landing Page Demo",
        contact: "kjluxuryconcierge@yahoo.com",
        status: "building",
        charge: 125,
        createdAt: '2026-03-16',
        notes: "Demo site in progress — will send when ready"
      },
      {
        id: 'demo_003',
        business: "BLESSED BY BRI NICOLE",
        project: "Hair Stylist Landing Page Demo",
        contact: "Phone: 313-652-2631",
        status: "building",
        charge: 125,
        createdAt: '2026-03-16',
        notes: "Hair stylist / mom. Scheduling: https://app.acuityscheduling.com/schedule/336e5e38. Demo in progress — will send when ready."
      }
    ];
    
    const stageNames = ['Pending', 'Paid', 'In Review', 'Design', 'Review', 'Launch'];
    
    function renderClients() {
      const grid = document.getElementById('clients-grid');
      
      if (clients.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No clients yet</h3>
            <p>Clients will appear here when payments are received</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = clients.map(client => `
        <div class="client-card ${client.awaitingPayment ? 'awaiting-payment' : ''}">
          <div class="client-info">
            <h3>${client.name}</h3>
            <p class="client-email">${client.email}</p>
            <div class="client-project">${client.project}</div>
            ${client.awaitingPayment ? `
              <div class="client-meta">
                <span>⏳ Awaiting Payment</span>
                <span>📅 ${client.createdAt}</span>
              </div>
              <div class="awaiting-note">
                <p>Stripe link pending — waiting for payment to start project</p>
              </div>
            ` : `
              <div class="client-meta">
                <span>💰 $${client.amount}</span>
                <span>📅 ${client.createdAt}</span>
                <span>${client.confirmationSent ? '✅ Confirmed' : '⏳ Pending confirmation'}</span>
              </div>
              
              <div class="checklist">
                <h4>What's Needed</h4>
                <div class="checklist-items">
                  ${renderChecklist(client.checklist, client.project)}
                </div>
              </div>
              ${client.notes ? `
              <div class="project-notes">
                <h4>📝 Project Details</h4>
                <p>${client.notes}</p>
              </div>
              ` : ''}
            `}
          </div>
          
          ${!client.awaitingPayment ? `
            <div class="stage-tracker">
              <div class="stage-dots">
                ${stageNames.map((name, i) => `
                  <div class="stage-dot ${i < client.stage ? 'active' : ''} ${i === client.stage - 1 ? 'current' : ''}" title="${name}">
                    ${i + 1}
                  </div>
                `).join('')}
              </div>
              <div class="stage-name">${stageNames[client.stage - 1]}</div>
            </div>
          ` : `
            <div class="stage-tracker">
              <div class="stage-name" style="color: #f59e0b;">💳 Payment Pending</div>
            </div>
          `}
        </div>
      `).join('');
      
      // Update stats
      document.getElementById('active-count').textContent = clients.filter(c => !c.awaitingPayment).length;
      document.getElementById('total-revenue').textContent = '$' + clients.filter(c => !c.awaitingPayment).reduce((sum, c) => sum + c.amount, 0).toLocaleString();
      document.getElementById('payment-pending-count').textContent = clients.filter(c => c.awaitingPayment).length;
      document.getElementById('launch-count').textContent = clients.filter(c => c.stage === 5).length;
    }
    
    function renderChecklist(checklist, project) {
      // Different checklist items based on project type
      let items;
      if (project === 'NEW LOGO') {
        items = [
          { key: 'imagesProvided', label: 'Logo References' },
          { key: 'designPreferences', label: 'Design Prefs' }
        ];
      } else {
        items = [
          { key: 'domainAccess', label: 'Domain Access' },
          { key: 'contentProvided', label: 'Content' },
          { key: 'imagesProvided', label: 'Images' },
          { key: 'hostingPrefs', label: 'Hosting' },
          { key: 'designPreferences', label: 'Design Prefs' }
        ];
      }
      
      return items.map(item => `
        <div class="check-item ${checklist[item.key] ? 'done' : ''}">
          <span class="icon">${checklist[item.key] ? '✓' : '○'}</span>
          ${item.label}
        </div>
      `).join('');
    }
    
    function renderDemoLeads() {
      const grid = document.getElementById('demo-leads-grid');
      
      if (demoLeads.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No demo leads yet</h3>
            <p>Demo sites created for potential clients will appear here</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = demoLeads.map(lead => `
        <div class="demo-lead-card">
          <div class="demo-lead-header">
            <div>
              <div class="demo-lead-business">${lead.business}</div>
              <div class="demo-lead-project">${lead.project}</div>
            </div>
            <span class="demo-lead-status demo-status-${lead.status}">${lead.status === 'awaiting' ? '⏳ Awaiting Response' : lead.status === 'building' ? '🔨 Building Demo' : lead.status === 'interested' ? '✓ Interested' : '✗ Declined'}</span>
          </div>
          
          <div class="demo-lead-details">
            <div class="demo-lead-detail">
              <span class="demo-detail-label">Proposed Charge</span>
              <span class="demo-detail-value price">$${lead.charge}</span>
            </div>
            <div class="demo-lead-detail">
              <span class="demo-detail-label">Contact Status</span>
              <span class="demo-detail-value">${lead.contact}</span>
            </div>
            <div class="demo-lead-detail">
              <span class="demo-detail-label">Date Created</span>
              <span class="demo-detail-value">${lead.createdAt}</span>
            </div>
          </div>
          
          ${lead.notes ? `
          <div style="margin-top: 16px; padding: 12px 16px; background: rgba(139, 92, 246, 0.1); border-radius: 8px; border-left: 3px solid #8b5cf6;">
            <p style="color: #ccc; font-size: 14px;">${lead.notes}</p>
          </div>
          ` : ''}
        </div>
      `).join('');
    }
    
    renderClients();
    renderDemoLeads();
  </script>
</body>
</html>
